name: Update Stats and Deploy Pages

on:
  schedule:
    # Run at the top of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI
  push:
    branches:
      - main

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    name: Update stats and deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # read and commit the generated data.json
      pages: write      # deploy to GitHub Pages
      id-token: write   # obtain OIDC token for Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate data.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: OWASP-BLT
          OUT_FILE: data.json
        run: python3 .github/scripts/generate_data.py

      - name: Commit updated data.json
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Compare new data.json against HEAD, ignoring the generated_at field.
          # If only the timestamp changed, restore the old generated_at so that
          # no spurious commit is made.
          OLD_TS=$(git show HEAD:data.json 2>/dev/null | jq -r '.generated_at // empty' || true)
          OLD_DATA=$(git show HEAD:data.json 2>/dev/null | jq -S -c 'del(.generated_at)' || echo '{}')
          NEW_DATA=$(jq -S -c 'del(.generated_at)' data.json)
          if [ "$OLD_DATA" = "$NEW_DATA" ] && [ -n "$OLD_TS" ]; then
            echo "No meaningful changes detected (only generated_at differs). Restoring old timestamp."
            jq --arg ts "$OLD_TS" '.generated_at = $ts' data.json > data.json.tmp && mv data.json.tmp data.json
          fi

          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update data.json with latest stats"

          # Integrate any commits that landed on origin/main after checkout
          git fetch origin main
          git rebase origin/main

          # Push; retry once if another run won the race
          git push origin HEAD:main || (echo "Push failed, retrying after rebase..." && git fetch origin main && git rebase origin/main && git push origin HEAD:main)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
